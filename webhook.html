<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Webhook Tool</title>
<style>
body { background:#111; color:#fff; font-family:sans-serif; }
.container { max-width:700px; margin:auto; padding:10px; }
.tab-content { display:none; }
.tab-content.active { display:block; }
input, textarea {
    width:100%;
    padding:10px;
    margin:10px 0;
    background:#1e1e1e;
    border:1px solid #333;
    color:white;
}
button {
    padding:10px;
    margin:5px 0;
    background:#444;
    color:white;
    border:none;
    cursor:pointer;
}
.grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
nav button { margin-right:5px; }
</style>
</head>
<body>

<header>
<h1>Webhook Tool</h1>
<nav>
<button onclick="showTab('url')">URL</button>
<button onclick="showTab('message')">Message</button>
<button onclick="showTab('embed')">Embed</button>
<button onclick="showTab('profile')">Name & PFP</button>
<button onclick="showTab('spam')">Spam</button>
</nav>
</header>

<div class="container">

<!-- URL -->
<div id="url" class="tab-content active">
<input id="webhookUrl" placeholder="Webhook URL">
<button onclick="saveUrl()">Save</button>
</div>

<!-- Message -->
<div id="message" class="tab-content">
<textarea id="msgContent" rows="5" placeholder="Message"></textarea>
<button onclick="sendMsg()">Send</button>
</div>

<!-- Embed -->
<div id="embed" class="tab-content">
<div class="grid">
<input id="embTitle" placeholder="Title">
<input id="embColor" placeholder="Hex Color">
</div>
<textarea id="embDesc" rows="4" placeholder="Description"></textarea>
<button onclick="sendEmbed()">Send Embed</button>
</div>

<!-- Name & PFP -->
<div id="profile" class="tab-content">
<input id="newName" placeholder="New Display Name">
<input id="newAvatar" placeholder="Avatar URL (optional)">
<button onclick="updateProfile()">Update</button>
</div>

<!-- Spam -->
<div id="spam" class="tab-content">
<input type="number" id="delay" value="1" step="0.1" placeholder="Delay (seconds)">
<button onclick="start()">Start</button>
<button onclick="stop()">Stop</button>
</div>

</div>

<script>
let loop = null;

// Load saved URL
window.onload = () => {
    const url = localStorage.getItem('webhook');
    if (url) document.getElementById('webhookUrl').value = url;
};

// Tab switching
function showTab(id) {
    document.querySelectorAll('.tab-content')
        .forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// Save webhook URL
function saveUrl() {
    localStorage.setItem('webhook', document.getElementById('webhookUrl').value);
}

// API request
async function request(data, method="POST") {
    const url = document.getElementById('webhookUrl').value;
    if (!url) return;
    try {
        await fetch(url, {
            method,
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify(data)
        });
    } catch {}
}

// Send message
function sendMsg() {
    request({ content: msgContent.value });
}

// Send embed
function sendEmbed() {
    const color = embColor.value ? parseInt(embColor.value.replace('#',''),16) : null;
    const embed = { description: embDesc.value };
    if (embTitle.value) embed.title = embTitle.value;
    if (color) embed.color = color;
    request({ embeds: [embed] });
}

// Update name & avatar
function updateProfile() {
    const data = { name: newName.value };
    if (newAvatar.value) data.avatar = newAvatar.value;
    request(data, "PATCH");
}

// Spam loop
function start() {
    if (loop) return;
    loop = setInterval(sendMsg, delay.value * 1000);
}

function stop() {
    clearInterval(loop);
    loop = null;
}
</script>

</body>
</html>
